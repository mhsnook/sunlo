name: Tests

on:
  push:
    branches: [next]
  pull_request:
    branches: [next, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect PR branch errors
        run: |
          pnpm check 2>&1 | grep ': error TS' | sort > /tmp/pr-errors.txt || true

      - name: Collect base branch errors
        run: |
          git worktree add /tmp/base-branch origin/${{ github.base_ref }}
          cd /tmp/base-branch
          pnpm install --frozen-lockfile --silent
          pnpm check 2>&1 | grep ': error TS' | sort > /tmp/base-errors.txt || true
          cd $GITHUB_WORKSPACE
          git worktree remove --force /tmp/base-branch

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const baseErrors = fs.readFileSync('/tmp/base-errors.txt', 'utf8').trim().split('\n').filter(Boolean);
            const prErrors   = fs.readFileSync('/tmp/pr-errors.txt',   'utf8').trim().split('\n').filter(Boolean);

            const baseSet = new Set(baseErrors);
            const prSet   = new Set(prErrors);
            const newErrors = prErrors.filter(e => !baseSet.has(e));
            const resolved  = baseErrors.filter(e => !prSet.has(e));

            const summary = `**Before:** ${baseErrors.length} error(s) → **After:** ${prErrors.length} error(s)` +
              (newErrors.length || resolved.length
                ? ` (+${newErrors.length} new, −${resolved.length} resolved)`
                : ' (no change)');

            const lines = ['### TypeScript type check', '', summary];
            if (newErrors.length > 0)
              lines.push(`\n**New (${newErrors.length}):**\n\`\`\`\n${newErrors.join('\n')}\n\`\`\``);
            if (resolved.length > 0)
              lines.push(`\n**Resolved (${resolved.length}):**\n\`\`\`\n${resolved.join('\n')}\n\`\`\``);
            const body = lines.join('\n');

            const marker = '### TypeScript type check';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Fail on new errors
        run: |
          NEW=$(comm -13 /tmp/base-errors.txt /tmp/pr-errors.txt | wc -l | tr -d ' ')
          if [ "$NEW" -gt 0 ]; then
            echo "❌ $NEW new type error(s) introduced — see PR comment for details"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect PR branch lint errors
        run: |
          pnpm exec oxlint . -f unix > /tmp/pr-oxlint.txt 2>&1 || true
          pnpm exec eslint . -f unix > /tmp/pr-eslint.txt 2>&1 || true
          cat /tmp/pr-oxlint.txt /tmp/pr-eslint.txt \
            | grep -E '^[^:[:space:]][^:]*:[0-9]+:[0-9]+:' \
            | sort -u > /tmp/pr-lint.txt || true

      - name: Collect base branch lint errors
        run: |
          git worktree add /tmp/base-branch origin/${{ github.base_ref }}
          cd /tmp/base-branch
          pnpm install --frozen-lockfile --silent
          pnpm exec oxlint . -f unix > /tmp/base-oxlint.txt 2>&1 || true
          pnpm exec eslint . -f unix > /tmp/base-eslint.txt 2>&1 || true
          cat /tmp/base-oxlint.txt /tmp/base-eslint.txt \
            | grep -E '^[^:[:space:]][^:]*:[0-9]+:[0-9]+:' \
            | sort -u > /tmp/base-lint.txt || true
          cd $GITHUB_WORKSPACE
          git worktree remove --force /tmp/base-branch

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const baseErrors = fs.readFileSync('/tmp/base-lint.txt', 'utf8').trim().split('\n').filter(Boolean);
            const prErrors   = fs.readFileSync('/tmp/pr-lint.txt',   'utf8').trim().split('\n').filter(Boolean);

            const baseSet = new Set(baseErrors);
            const prSet   = new Set(prErrors);
            const newErrors = prErrors.filter(e => !baseSet.has(e));
            const resolved  = baseErrors.filter(e => !prSet.has(e));

            const summary = `**Before:** ${baseErrors.length} issue(s) → **After:** ${prErrors.length} issue(s)` +
              (newErrors.length || resolved.length
                ? ` (+${newErrors.length} new, −${resolved.length} resolved)`
                : ' (no change)');

            const lines = ['### Lint (oxlint + eslint)', '', summary];
            if (newErrors.length > 0)
              lines.push(`\n**New (${newErrors.length}):**\n\`\`\`\n${newErrors.slice(0, 50).join('\n')}\n${newErrors.length > 50 ? `… and ${newErrors.length - 50} more` : ''}\n\`\`\``);
            if (resolved.length > 0)
              lines.push(`\n**Resolved (${resolved.length}):**\n\`\`\`\n${resolved.slice(0, 50).join('\n')}\n${resolved.length > 50 ? `… and ${resolved.length - 50} more` : ''}\n\`\`\``);
            const body = lines.join('\n');

            const marker = '### Lint (oxlint + eslint)';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Fail on new issues
        run: |
          NEW=$(comm -13 /tmp/base-lint.txt /tmp/pr-lint.txt | wc -l | tr -d ' ')
          if [ "$NEW" -gt 0 ]; then
            echo "❌ $NEW new lint issue(s) introduced — see PR comment for details"
            exit 1
          fi

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Playwright browsers
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Cache Docker layers for Supabase
      - name: Cache Docker layers
        uses: jpribyl/action-docker-layer-caching@v0.1.1
        with:
          key: docker-layers-${{ runner.os }}-supabase-${{ hashFiles('supabase/config.toml') }}
          restore-keys: docker-layers-${{ runner.os }}-supabase-
        continue-on-error: true

      - name: Start Supabase
        run: supabase start -x studio,imgproxy,logflare,vector,supavisor,edge-runtime,inbucket

      - name: Set up environment variables
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      # Run navigation tests only (fast, no db mutations)
      # Only chromium in CI for speed; full browser matrix can be run locally
      - name: Run navigation tests
        run: SKIP_DB_RESET=1 pnpm exec playwright test e2e/navigations e2e/example.spec.ts e2e/login-flow.spec.ts --fully-parallel --workers=100% --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  scenetest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Playwright browsers (scenetest uses Playwright under the hood)
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Cache Docker layers for Supabase
      - name: Cache Docker layers
        uses: jpribyl/action-docker-layer-caching@v0.1.1
        with:
          key: docker-layers-${{ runner.os }}-supabase-${{ hashFiles('supabase/config.toml') }}
          restore-keys: docker-layers-${{ runner.os }}-supabase-
        continue-on-error: true

      - name: Start Supabase
        run: supabase start -x studio,imgproxy,logflare,vector,supavisor,edge-runtime,inbucket

      - name: Set up environment variables
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Start dev server
        run: pnpm dev &

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run scenetest specs
        run: pnpm scene

      - name: Upload scenetest report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: scenetest-report
          path: scenetest/.reports/
          retention-days: 30
