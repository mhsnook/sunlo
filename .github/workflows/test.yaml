name: Tests

on:
  push:
    branches: [next]
  pull_request:
    branches: [next, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect PR branch errors
        run: |
          pnpm check 2>&1 | grep ': error TS' | sort > /tmp/pr-errors.txt || true

      - name: Collect base branch errors
        run: |
          git worktree add /tmp/base-branch origin/${{ github.base_ref }}
          cd /tmp/base-branch
          pnpm install --frozen-lockfile --silent
          pnpm check 2>&1 | grep ': error TS' | sort > /tmp/base-errors.txt || true
          cd $GITHUB_WORKSPACE
          git worktree remove --force /tmp/base-branch

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const baseLines = fs.readFileSync('/tmp/base-errors.txt', 'utf8').trim().split('\n').filter(Boolean);
            const prLines   = fs.readFileSync('/tmp/pr-errors.txt',   'utf8').trim().split('\n').filter(Boolean);

            // Parse "file(line,col): error TS####: message" — tsc's default (non-pretty) format.
            const parse = (raw) => {
              const m = raw.match(/^(.+?)\((\d+),(\d+)\):\s*(error\s+TS\d+:\s*.*)$/);
              if (!m) return { file: '', line: 0, col: 0, rest: raw, raw };
              return { file: m[1], line: parseInt(m[2], 10), col: parseInt(m[3], 10), rest: m[4], raw };
            };

            const baseErrors = baseLines.map(parse);
            const prErrors   = prLines.map(parse);
            const baseSet = new Set(baseLines);
            const prSet   = new Set(prLines);

            // First pass: exact-match set difference.
            const newCandidates = prErrors.filter(e => !baseSet.has(e.raw));
            const resolvedCandidates = baseErrors.filter(e => !prSet.has(e.raw));

            // Second pass: pair "new" with "resolved" when same file + same column + same
            // error code/message and line numbers within 10. Treat as a shifted (unchanged)
            // error rather than a new one — an unrelated edit just bumped the line number.
            // A changed column means the line itself was edited, so the error is fair game.
            const PROXIMITY = 10;
            const resolvedPool = [...resolvedCandidates];
            const newErrors = [];
            const moved = [];
            for (const n of newCandidates) {
              const idx = resolvedPool.findIndex(r =>
                r.file === n.file &&
                r.col === n.col &&
                r.rest === n.rest &&
                Math.abs(r.line - n.line) <= PROXIMITY
              );
              if (idx >= 0) {
                moved.push({ from: resolvedPool[idx], to: n });
                resolvedPool.splice(idx, 1);
              } else {
                newErrors.push(n);
              }
            }
            const resolved = resolvedPool;

            fs.writeFileSync('/tmp/tsc-new-count.txt', String(newErrors.length));

            const movedNote = moved.length ? ` (${moved.length} shifted within ±${PROXIMITY} lines, not counted)` : '';
            const summary = `**Before:** ${baseErrors.length} error(s) → **After:** ${prErrors.length} error(s)` +
              (newErrors.length || resolved.length
                ? ` (+${newErrors.length} new, −${resolved.length} resolved)${movedNote}`
                : ` (no change)${movedNote}`);

            const lines = ['### TypeScript type check', '', summary];
            if (newErrors.length > 0)
              lines.push(`\n**New (${newErrors.length}):**\n\`\`\`\n${newErrors.map(e => e.raw).join('\n')}\n\`\`\``);
            if (resolved.length > 0)
              lines.push(`\n**Resolved (${resolved.length}):**\n\`\`\`\n${resolved.map(e => e.raw).join('\n')}\n\`\`\``);
            const body = lines.join('\n');

            const marker = '### TypeScript type check';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Fail on new errors
        run: |
          NEW=$(cat /tmp/tsc-new-count.txt 2>/dev/null || echo 0)
          if [ "$NEW" -gt 0 ]; then
            echo "❌ $NEW new type error(s) introduced — see PR comment for details"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect PR branch lint errors
        run: |
          pnpm exec oxlint . -f unix > /tmp/pr-oxlint.txt 2>&1 || true
          pnpm exec eslint . -f unix > /tmp/pr-eslint.txt 2>&1 || true
          cat /tmp/pr-oxlint.txt /tmp/pr-eslint.txt \
            | grep -E '^[^:[:space:]][^:]*:[0-9]+:[0-9]+:' \
            | sort -u > /tmp/pr-lint.txt || true

      - name: Collect base branch lint errors
        run: |
          git worktree add /tmp/base-branch origin/${{ github.base_ref }}
          cd /tmp/base-branch
          pnpm install --frozen-lockfile --silent
          pnpm exec oxlint . -f unix > /tmp/base-oxlint.txt 2>&1 || true
          pnpm exec eslint . -f unix > /tmp/base-eslint.txt 2>&1 || true
          cat /tmp/base-oxlint.txt /tmp/base-eslint.txt \
            | grep -E '^[^:[:space:]][^:]*:[0-9]+:[0-9]+:' \
            | sort -u > /tmp/base-lint.txt || true
          cd $GITHUB_WORKSPACE
          git worktree remove --force /tmp/base-branch

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const baseLines = fs.readFileSync('/tmp/base-lint.txt', 'utf8').trim().split('\n').filter(Boolean);
            const prLines   = fs.readFileSync('/tmp/pr-lint.txt',   'utf8').trim().split('\n').filter(Boolean);

            // Parse "file:line:col: message" — file paths in this repo have no colons.
            const parse = (raw) => {
              const m = raw.match(/^([^:]+):(\d+):(\d+):\s*(.*)$/);
              if (!m) return { file: '', line: 0, col: 0, rest: raw, raw };
              return { file: m[1], line: parseInt(m[2], 10), col: parseInt(m[3], 10), rest: m[4], raw };
            };

            const baseErrors = baseLines.map(parse);
            const prErrors   = prLines.map(parse);
            const baseSet = new Set(baseLines);
            const prSet   = new Set(prLines);

            // First pass: exact-match set difference.
            const newCandidates = prErrors.filter(e => !baseSet.has(e.raw));
            const resolvedCandidates = baseErrors.filter(e => !prSet.has(e.raw));

            // Second pass: pair a "new" with a "resolved" when same file + same column +
            // same message text and line numbers within 10. Treat those as the same lint
            // issue that just shifted (e.g. an unrelated edit pushed it up/down the file).
            // A changed column means the line itself was edited, so the issue is fair game.
            const PROXIMITY = 10;
            const resolvedPool = [...resolvedCandidates];
            const newErrors = [];
            const moved = [];
            for (const n of newCandidates) {
              const idx = resolvedPool.findIndex(r =>
                r.file === n.file &&
                r.col === n.col &&
                r.rest === n.rest &&
                Math.abs(r.line - n.line) <= PROXIMITY
              );
              if (idx >= 0) {
                moved.push({ from: resolvedPool[idx], to: n });
                resolvedPool.splice(idx, 1);
              } else {
                newErrors.push(n);
              }
            }
            const resolved = resolvedPool;

            // Persist the new-error count so the fail step can read it without redoing this work.
            fs.writeFileSync('/tmp/lint-new-count.txt', String(newErrors.length));

            const movedNote = moved.length ? ` (${moved.length} shifted within ±${PROXIMITY} lines, not counted)` : '';
            const summary = `**Before:** ${baseErrors.length} issue(s) → **After:** ${prErrors.length} issue(s)` +
              (newErrors.length || resolved.length
                ? ` (+${newErrors.length} new, −${resolved.length} resolved)${movedNote}`
                : ` (no change)${movedNote}`);

            const lines = ['### Lint (oxlint + eslint)', '', summary];
            if (newErrors.length > 0)
              lines.push(`\n**New (${newErrors.length}):**\n\`\`\`\n${newErrors.slice(0, 50).map(e => e.raw).join('\n')}\n${newErrors.length > 50 ? `… and ${newErrors.length - 50} more` : ''}\n\`\`\``);
            if (resolved.length > 0)
              lines.push(`\n**Resolved (${resolved.length}):**\n\`\`\`\n${resolved.slice(0, 50).map(e => e.raw).join('\n')}\n${resolved.length > 50 ? `… and ${resolved.length - 50} more` : ''}\n\`\`\``);
            const body = lines.join('\n');

            const marker = '### Lint (oxlint + eslint)';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Fail on new issues
        run: |
          NEW=$(cat /tmp/lint-new-count.txt 2>/dev/null || echo 0)
          if [ "$NEW" -gt 0 ]; then
            echo "❌ $NEW new lint issue(s) introduced — see PR comment for details"
            exit 1
          fi

  bundle-size:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Set up dummy env for build
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=dummy" >> $GITHUB_ENV

      - name: Install dependencies (PR)
        run: pnpm install --frozen-lockfile

      - name: Build PR branch
        run: pnpm build:test

      - name: Measure PR bundle
        run: |
          PR_FILE=$(ls -S dist/assets/index-*.js | head -1)
          echo "PR_RAW=$(stat -c%s "$PR_FILE")" >> $GITHUB_ENV
          echo "PR_GZ=$(gzip -c "$PR_FILE" | wc -c)" >> $GITHUB_ENV

      - name: Build base branch
        run: |
          git worktree add /tmp/base-branch origin/${{ github.base_ref }}
          cd /tmp/base-branch
          pnpm install --frozen-lockfile --silent
          pnpm build:test
          BASE_FILE=$(ls -S dist/assets/index-*.js | head -1)
          echo "BASE_RAW=$(stat -c%s "$BASE_FILE")" >> $GITHUB_ENV
          echo "BASE_GZ=$(gzip -c "$BASE_FILE" | wc -c)" >> $GITHUB_ENV
          cd $GITHUB_WORKSPACE
          git worktree remove --force /tmp/base-branch

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fmt = (n) => (n / 1024).toFixed(2) + ' kB';
            const diff = (pr, base) => {
              const d = pr - base;
              const pct = base ? ((d / base) * 100).toFixed(2) : '0.00';
              const sign = d > 0 ? '+' : '';
              const emoji = d > 0 ? '🔺' : d < 0 ? '🟢' : '➖';
              return `${emoji} ${sign}${(d / 1024).toFixed(2)} kB (${sign}${pct}%)`;
            };
            const prRaw = parseInt(process.env.PR_RAW);
            const prGz = parseInt(process.env.PR_GZ);
            const baseRaw = parseInt(process.env.BASE_RAW);
            const baseGz = parseInt(process.env.BASE_GZ);

            const body = [
              '### Main bundle size',
              '',
              '`dist/assets/index-*.js` (largest chunk)',
              '',
              '|         | Base            | PR              | Δ                    |',
              '|---------|-----------------|-----------------|----------------------|',
              `| Raw     | ${fmt(baseRaw).padEnd(15)} | ${fmt(prRaw).padEnd(15)} | ${diff(prRaw, baseRaw)} |`,
              `| Gzipped | ${fmt(baseGz).padEnd(15)} | ${fmt(prGz).padEnd(15)} | ${diff(prGz, baseGz)} |`,
            ].join('\n');

            const marker = '### Main bundle size';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.76.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Playwright browsers
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Cache Docker layers for Supabase
      - name: Cache Docker layers
        uses: jpribyl/action-docker-layer-caching@v0.1.1
        with:
          key: docker-layers-${{ runner.os }}-supabase-${{ hashFiles('supabase/config.toml') }}
          restore-keys: docker-layers-${{ runner.os }}-supabase-
        continue-on-error: true

      - name: Start Supabase
        run: supabase start -x studio,imgproxy,logflare,vector,supavisor,edge-runtime,inbucket

      - name: Set up environment variables
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      # Run navigation tests only (fast, no db mutations)
      # Only chromium in CI for speed; full browser matrix can be run locally
      - name: Run navigation tests
        run: SKIP_DB_RESET=1 pnpm exec playwright test e2e/navigations e2e/example.spec.ts e2e/login-flow.spec.ts --fully-parallel --workers=100% --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  scenetest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.76.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Playwright browsers (scenetest uses Playwright under the hood)
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Cache Docker layers for Supabase
      - name: Cache Docker layers
        uses: jpribyl/action-docker-layer-caching@v0.1.1
        with:
          key: docker-layers-${{ runner.os }}-supabase-${{ hashFiles('supabase/config.toml') }}
          restore-keys: docker-layers-${{ runner.os }}-supabase-
        continue-on-error: true

      - name: Start Supabase
        run: supabase start -x studio,imgproxy,logflare,vector,supavisor,edge-runtime,inbucket

      - name: Set up environment variables
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Start dev server
        run: pnpm dev:local &

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run scenetest specs
        id: scene
        continue-on-error: true
        run: |
          rm -rf scenetest/.reports
          pnpm scene:ci

      - name: Comment scenetest results on PR
        if: github.event_name == 'pull_request' && !cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'scenetest/.reports';
            const marker = '### Scenetest';

            const upsertComment = async (body) => {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body.startsWith(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existing.id, body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, body,
                });
              }
            };

            if (!fs.existsSync(dir)) {
              await upsertComment([marker, '', '_No report was produced — scenetest may have crashed before writing output. Check the job log._'].join('\n'));
              return;
            }
            const jsonFiles = fs.readdirSync(dir)
              .filter(f => f.endsWith('.json'))
              .map(f => ({ f, mtime: fs.statSync(path.join(dir, f)).mtimeMs }))
              .sort((a, b) => b.mtime - a.mtime);
            if (jsonFiles.length === 0) {
              await upsertComment([marker, '', '_No JSON report found in `scenetest/.reports/`._'].join('\n'));
              return;
            }

            const report = JSON.parse(fs.readFileSync(path.join(dir, jsonFiles[0].f), 'utf8'));
            const s = report.summary;
            const headline = `Scenes: ${s.completed}/${s.scenes} completed · Assertions: ${s.assertions.passed}/${s.assertions.total} passed · Console errors: ${s.consoleErrors} · Duration: ${report.duration}ms`;

            const failed = report.scenes.filter(sc => sc.status !== 'completed' || sc.assertions.some(a => !a.result));
            const lines = [marker, '', headline];

            if (failed.length === 0) {
              lines.push('', 'All scenes passed ✅');
            } else {
              const cap = (str, n) => str && str.length > n ? str.slice(0, n) + '…' : str;
              const blocks = [];
              for (const sc of failed) {
                const b = [];
                const status = sc.status === 'completed' ? 'ASSERTION FAILED' : sc.status.toUpperCase();
                b.push(`✗ ${sc.name} — ${status}`);
                b.push(`  file: ${sc.file}`);
                if (sc.error) b.push(`  error: ${cap(sc.error.replace(/\s+/g, ' '), 1000)}`);
                const failedAssertions = sc.assertions.filter(a => !a.result).slice(0, 10);
                for (const a of failedAssertions) {
                  const loc = a.location ? ` (${a.location.file}:${a.location.line})` : '';
                  const actor = a.actor ? ` [${a.actor}]` : '';
                  b.push(`  ✗ ${cap(a.description, 200)}${actor}${loc}`);
                }
                blocks.push(b.join('\n'));
              }
              lines.push('', `**Failed (${failed.length}):**`, '', '```', blocks.join('\n\n'), '```');
            }

            let body = lines.join('\n');
            if (body.length > 60000) body = body.slice(0, 60000) + '\n… (truncated)\n```';
            await upsertComment(body);

      - name: Upload scenetest report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: scenetest-report
          path: scenetest/.reports/
          retention-days: 30

      - name: Fail job if scenetest failed
        if: steps.scene.outcome == 'failure'
        run: |
          echo "❌ scenetest reported failures — see PR comment"
          exit 1
